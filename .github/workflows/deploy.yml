name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: fajrjeju
  REGION: asia-northeast3
  SERVICE: fajrjeju
  IMAGE: asia-northeast3-docker.pkg.dev/fajrjeju/cloud-run-source-deploy/fajrjeju

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            BANK_API_KEY=${{ secrets.BANK_API_KEY }}
            BANK_API_SECRET=${{ secrets.BANK_API_SECRET }}
            BANK_CODE=NH
            BANK_ACCOUNT_NUMBER=3511397568773
            BANK_ACCOUNT_PASSWORD=${{ secrets.BANK_ACCOUNT_PASSWORD }}
            BANK_RESIDENT_NUMBER=${{ secrets.BANK_RESIDENT_NUMBER }}
            OPENBANKING_CLIENT_ID=${{ secrets.OPENBANKING_CLIENT_ID }}
            OPENBANKING_CLIENT_SECRET=${{ secrets.OPENBANKING_CLIENT_SECRET }}
            OPENBANKING_REDIRECT_URI=https://fajrjeju.com/api/bank/callback
            OPENBANKING_USE_TEST=true
